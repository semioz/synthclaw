name: "sentiment_augmentation"

source:
  type: huggingface
  dataset: "cornell-movie-review-data/rotten_tomatoes"
  split: "train"
  sample: 100

provider:
  type: anthropic
  model: "claude-haiku-4-5-20251001"
  temperature: 0.7

generation:
  task: augment
  count_per_example: 2
  concurrency: 10
  strategy: paraphrase

output:
  format: jsonl
  path: "./output/augmented_sentiment.jsonl"
