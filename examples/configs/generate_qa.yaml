name: "qa_pairs"

source:
  type: local
  path: "./data/documents.jsonl"
  format: jsonl

provider:
  type: openai
  model: "gpt-4o-mini"
  temperature: 0.7

generation:
  task: augment
  count_per_example: 3
  concurrency: 10
  template: |
    Based on the following document, generate a question-answer pair.

    Document:
    {text}

    Requirements:
    - Question should test comprehension, not just keyword matching
    - Answer should be directly supported by the document
    - Keep answers concise (1-2 sentences)

    Output as JSON: {"question": "...", "answer": "..."}
  system_prompt: |
    You are an expert at creating educational question-answer pairs for training data.
    Generate diverse questions: factual, inferential, and analytical.
    Output ONLY the JSON object, no additional text.

output:
  format: jsonl
  path: "./output/qa_pairs.jsonl"

checkpoint:
  enabled: true
  interval: 50
