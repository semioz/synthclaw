name: "product_reviews"

provider:
  type: openai
  model: "gpt-4o-mini"
  temperature: 0.8

generation:
  task: generate
  count: 100
  concurrency: 10
  categories:
    - electronics
    - books
    - clothing
    - home_kitchen
    - sports
  template: |
    Generate a realistic product review for category: {category}

    Requirements:
    - Written from a customer's perspective
    - 2-4 sentences
    - Include specific product details (brand names, features, etc.)
    - Natural tone - can be positive, negative, or mixed
    - Mention at least one specific aspect (quality, price, shipping, etc.)

output:
  format: jsonl
  path: "./output/product_reviews.jsonl"
